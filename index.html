<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FamiliaLopBas + Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== ESTILOS (mismos que antes + añadidos para chat) ===== */
:root {
  --bg:#f2f4f8; --bg2:#ffffff; --bg3:#e8ecf4; --card:#ffffff;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --text:#1a1a2e; --text2:#6b7280; --text3:#9ca3af;
  --accent:#6c63ff; --accent2:#ff6584; --accent3:#00c875;
  --radius:18px; --radius-sm:12px;
  --shadow:0 2px 12px rgba(0,0,0,0.07); --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
/* Copia aquí todos los estilos de la versión anterior (son muy largos) */
/* Por brevedad, incluyo solo los nuevos estilos para chat */
.chat-container{display:flex;flex-direction:column;height:100%;background:var(--bg)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-message{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;word-wrap:break-word}
.chat-message.mio{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.chat-message.otro{background:white;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.chat-message .autor{font-size:10px;opacity:.7;margin-bottom:4px;font-weight:600}
.chat-message .fecha{font-size:9px;opacity:.5;margin-top:4px;text-align:right}
.chat-input-bar{display:flex;gap:8px;padding:12px;background:white;border-top:1px solid var(--border)}
.chat-input-bar input{flex:1;padding:12px;border:1.5px solid var(--border2);border-radius:25px;outline:none;font-size:14px}
.chat-input-bar button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);border:none;color:white;font-size:20px;cursor:pointer}
.btn-notificaciones{background:var(--bg3);border:none;padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;margin:8px 16px}
.btn-notificaciones.activado{background:#43e97b;color:white}
.nav-chat{display:flex;gap:8px;padding:8px 16px;background:white;border-bottom:1px solid var(--border)}
.nav-chat .chip{flex:1;text-align:center}
</style>
</head>
<body>

<div id="splash">
  <div class="logo">FamiliaLopBas</div>
  <div class="sub">Tu familia, siempre conectada</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<div id="loading"><div class="spinner"></div></div>
<div id="toast"></div>

<!-- AUTH (mismo código que antes) -->
<div class="screen" id="screen-auth">
  <div class="auth-box">
    <div class="auth-hero"><div class="icon">🏠</div><h1>FamiliaLopBas</h1><p>La app de tu familia</p></div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Entrar</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">Registro</div>
    </div>
    <div class="auth-panel active" id="panel-login">
      <div class="auth-error" id="login-error"></div>
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
      <div class="divider"><span>o</span></div>
      <button class="btn-google" onclick="doGoogleLogin()">Continuar con Google</button>
    </div>
    <div class="auth-panel" id="panel-register">
      <div class="auth-error" id="register-error"></div>
      <div class="field"><label>Tu nombre</label><input type="text" id="reg-name"></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="reg-pass"></div>
      <button class="btn-primary" onclick="doRegister()">Crear cuenta</button>
      <div class="divider"><span>o</span></div>
      <button class="btn-google" onclick="doGoogleLogin()">Continuar con Google</button>
    </div>
  </div>
</div>

<!-- FAMILIA SETUP -->
<div class="screen" id="screen-familia">
  <div class="familia-box">
    <div style="font-size:26px;font-weight:800">👨‍👩‍👧‍👦 Tu familia</div>
    <div class="option-card" onclick="crearFamilia()">🏠 Crear familia nueva</div>
    <div class="option-card" onclick="toggleJoinForm()">🔗 Unirme a una familia</div>
    <div class="join-form" id="join-form">
      <input type="text" class="code-input" id="join-code" placeholder="XXXXXX" maxlength="6">
      <button class="btn-primary" onclick="unirseAFamilia()">Unirme</button>
    </div>
  </div>
</div>

<!-- HOME (versión simplificada con acceso al chat) -->
<div class="screen" id="screen-home">
  <div class="home-header">
    <div class="home-greeting">Hola,</div>
    <div class="home-name" id="home-username">Cargando...</div>
    <div class="profile-btn" id="profile-btn" onclick="toggleProfile()">A</div>
  </div>
  <div class="modules-section">
    <div class="modules-title">Módulos</div>
    <div class="modules-grid">
      <div class="module-card" onclick="abrirChat()">💬 Chat familiar</div>
      <div class="module-card" onclick="abrirCesta()">🛒 Cesta</div>
      <div class="module-card" onclick="abrirTareas()">✅ Tareas</div>
      <div class="module-card" onclick="abrirLocalizacion()">📍 Localización</div>
    </div>
  </div>
  <button class="btn-notificaciones" id="btn-notif" onclick="solicitarPermisoNotificaciones()">🔔 Activar notificaciones</button>
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showScreen('home')">🏠 Inicio</div>
    <div class="nav-item" onclick="abrirChat()">💬 Chat</div>
  </div>
</div>

<!-- CHAT -->
<div class="screen" id="screen-chat">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <span class="screen-title">💬 Chat familiar</span>
  </div>
  <div class="chat-container">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <input type="text" id="chat-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')enviarMensaje()">
      <button onclick="enviarMensaje()">📤</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ===== CONFIGURACIÓN FIREBASE =====
firebase.initializeApp({
  apiKey:"AIzaSyBpw-IXMNsthOUfwNzugMeiNNLT-TndaAM",
  authDomain:"familialopbas.firebaseapp.com",
  databaseURL:"https://familialopbas-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"familialopbas",
  storageBucket:"familialopbas.firebasestorage.app",
  messagingSenderId:"152258815775",
  appId:"1:152258815775:web:f3d530d07d43113647b22a"
});

const auth = firebase.auth();
const db = firebase.database();
let currentUser = null;
let familiaData = null;
let chatListener = null;

// ===== FUNCIONES AUXILIARES =====
const T = id => document.getElementById(id);
const showToast = (msg) => { const t = T('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };
const showLoading = () => T('loading').classList.add('show');
const hideLoading = () => T('loading').classList.remove('show');
const showScreen = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); T('screen-'+id).classList.add('active'); };
const hideSplash = () => { const sp = T('splash'); sp.style.opacity = '0'; setTimeout(() => sp.style.display = 'none', 500); };
setTimeout(() => { if(T('splash') && T('splash').style.display !== 'none') hideSplash(); }, 5000);

// ===== AUTENTICACIÓN =====
window.switchAuthTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
  T('panel-login').classList.toggle('active', tab==='login');
  T('panel-register').classList.toggle('active', tab==='register');
};

window.doLogin = async () => {
  const email = T('login-email').value.trim();
  const pass = T('login-pass').value;
  if(!email || !pass) return;
  showLoading();
  try { await auth.signInWithEmailAndPassword(email, pass); }
  catch(err) { hideLoading(); showToast('Error: '+err.message); }
};

window.doRegister = async () => {
  const name = T('reg-name').value.trim();
  const email = T('reg-email').value.trim();
  const pass = T('reg-pass').value;
  if(!name || !email || pass.length<6) return showToast('Completa todos los campos');
  showLoading();
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({displayName: name});
    await db.ref('users/'+cred.user.uid).set({name, email, role:'padre', familiaId: null});
  } catch(err) { hideLoading(); showToast('Error: '+err.message); }
};

window.doGoogleLogin = async () => {
  showLoading();
  try {
    const cred = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    const userData = await db.ref('users/'+cred.user.uid).once('value');
    if(!userData.exists()) {
      await db.ref('users/'+cred.user.uid).set({
        name: cred.user.displayName || 'Usuario',
        email: cred.user.email,
        role: 'padre',
        familiaId: null
      });
    }
  } catch(err) { hideLoading(); showToast('Error: '+err.message); }
};

window.doLogout = async () => {
  if(chatListener) chatListener.off();
  await auth.signOut();
  showScreen('auth');
};

// ===== FAMILIA =====
function genCodigo() { return Math.random().toString(36).substring(2,8).toUpperCase(); }

window.crearFamilia = async () => {
  if(!currentUser) return;
  showLoading();
  const codigo = genCodigo();
  const familiaId = 'fam_'+Date.now();
  try {
    await db.ref('familias/'+familiaId).set({
      nombre: 'Mi Familia',
      codigo: codigo,
      creadoPor: currentUser.uid,
      miembros: { [currentUser.uid]: true }
    });
    await db.ref('users/'+currentUser.uid).update({ familiaId: familiaId, role: 'padre' });
    await cargarHome();
  } catch(err) { hideLoading(); showToast('Error: '+err.message); }
};

window.toggleJoinForm = () => T('join-form').classList.toggle('visible');

window.unirseAFamilia = async () => {
  const codigo = T('join-code').value.trim().toUpperCase();
  if(codigo.length !== 6) return showToast('Código inválido');
  showLoading();
  try {
    const familias = await db.ref('familias').once('value');
    let encontrada = null;
    familias.forEach(f => { if(f.val().codigo === codigo) encontrada = { id: f.key, ...f.val() }; });
    if(!encontrada) throw new Error('Código no encontrado');
    await db.ref('familias/'+encontrada.id+'/miembros/'+currentUser.uid).set(true);
    await db.ref('users/'+currentUser.uid).update({ familiaId: encontrada.id, role: 'hijo' });
    await cargarHome();
  } catch(err) { hideLoading(); showToast(err.message); }
};

async function cargarHome() {
  try {
    const userData = await db.ref('users/'+currentUser.uid).once('value');
    const familiaId = userData.val().familiaId;
    if(!familiaId) { hideLoading(); showScreen('familia'); return; }
    const famData = await db.ref('familias/'+familiaId).once('value');
    familiaData = { id: familiaId, ...famData.val(), userRole: userData.val().role };
    const nombre = currentUser.displayName || userData.val().name || 'Usuario';
    T('home-username').innerHTML = nombre.split(' ')[0];
    T('profile-btn').textContent = nombre.substring(0,2).toUpperCase();
    hideLoading();
    showScreen('home');
    // Mostrar estado de notificaciones
    const notifPerm = Notification.permission === 'granted';
    const btn = T('btn-notif');
    if(btn) {
      btn.textContent = notifPerm ? '🔔 Notificaciones activadas ✅' : '🔔 Activar notificaciones';
      btn.classList.toggle('activado', notifPerm);
    }
  } catch(err) { hideLoading(); showToast('Error al cargar'); }
}

// ===== NOTIFICACIONES PUSH =====
window.solicitarPermisoNotificaciones = async () => {
  if (!("Notification" in window)) {
    showToast("Este navegador no soporta notificaciones");
    return;
  }
  
  if (Notification.permission === "granted") {
    showToast("✅ Ya tienes notificaciones activadas");
    return;
  }
  
  if (Notification.permission !== "denied") {
    const permiso = await Notification.requestPermission();
    if (permiso === "granted") {
      showToast("✅ Notificaciones activadas. Recibirás alertas del chat!");
      const btn = T('btn-notif');
      if(btn) {
        btn.textContent = '🔔 Notificaciones activadas ✅';
        btn.classList.add('activado');
      }
      // Notificación de prueba
      new Notification("🎉 Notificaciones activadas", {
        body: "Recibirás alertas cuando te mencionen o lleguen mensajes nuevos",
        icon: "https://emojicdn.elk.sh/🏠"
      });
    } else {
      showToast("❌ Permiso denegado. Actívalo desde ajustes del navegador");
    }
  }
};

function enviarNotificacion(mensaje, emisor, tipo = 'mensaje') {
  if (Notification.permission !== "granted") return;
  
  // Solo notificar si NO es el propio usuario quien envió el mensaje
  if (emisor === currentUser?.uid) return;
  
  new Notification(`💬 ${mensaje.autor || 'Alguien'} te ha escrito`, {
    body: mensaje.texto,
    icon: "https://emojicdn.elk.sh/💬",
    tag: "chat-notification",
    renotify: true
  });
}

// ===== CHAT =====
window.abrirChat = () => {
  showScreen('chat');
  if(!familiaData) return;
  
  // Limpiar listener anterior
  if(chatListener) chatListener.off();
  
  // Escuchar mensajes en tiempo real
  const chatRef = db.ref(`familias/${familiaData.id}/chat`);
  chatListener = chatRef.on('value', (snap) => {
    const mensajes = snap.val() || {};
    renderChat(mensajes);
  });
};

function renderChat(mensajes) {
  const container = T('chat-messages');
  if(!container) return;
  
  const mensajesArray = Object.entries(mensajes).sort((a,b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
  
  if(mensajesArray.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px">💬 No hay mensajes. ¡Escribe algo!</div>';
    return;
  }
  
  container.innerHTML = mensajesArray.map(([id, msg]) => {
    const esMio = msg.uid === currentUser?.uid;
    const hora = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    return `
      <div class="chat-message ${esMio ? 'mio' : 'otro'}">
        <div class="autor">${esMio ? 'Tú' : (msg.autor || 'Usuario')}</div>
        <div>${escapeHtml(msg.texto)}</div>
        <div class="fecha">${hora}</div>
      </div>
    `;
  }).join('');
  
  // Auto-scroll al final
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

window.enviarMensaje = async () => {
  const input = T('chat-input');
  const texto = input.value.trim();
  if(!texto || !familiaData) return;
  
  input.value = '';
  
  const userData = await db.ref(`users/${currentUser.uid}`).once('value');
  const nombre = userData.val()?.name || currentUser.displayName || 'Usuario';
  
  const nuevoMensaje = {
    texto: texto,
    uid: currentUser.uid,
    autor: nombre,
    timestamp: Date.now()
  };
  
  const chatRef = db.ref(`familias/${familiaData.id}/chat`);
  const newMsgRef = chatRef.push();
  await newMsgRef.set(nuevoMensaje);
  
  // Enviar notificación a otros miembros (esto se hace desde el receptor, pero podemos guardar una notificación en la DB)
  // La notificación se dispara en el evento 'value' de cada cliente
};

// ===== FUNCIONES BÁSICAS DE MÓDULOS (simplificadas) =====
window.abrirCesta = () => { showToast('🛒 Cesta - En desarrollo con chat'); };
window.abrirTareas = () => { showToast('✅ Tareas - En desarrollo con chat'); };
window.abrirLocalizacion = () => {
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => window.open(`https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`, '_blank'),
      () => showToast('Activa ubicación en ajustes')
    );
  } else showToast('GPS no soportado');
};

// ===== INICIALIZACIÓN =====
auth.onAuthStateChanged(async (user) => {
  currentUser = user;
  hideSplash();
  if(!user) { showScreen('auth'); hideLoading(); return; }
  showLoading();
  try {
    const userData = await db.ref('users/'+user.uid).once('value');
    if(!userData.exists()) {
      await db.ref('users/'+user.uid).set({
        name: user.displayName || user.email.split('@')[0],
        email: user.email,
        role: 'padre',
        familiaId: null
      });
    }
    await cargarHome();
  } catch(err) { hideLoading(); showToast('Error: '+err.message); }
});

// Cerrar sesión con botón
window.toggleProfile = () => {
  const menu = document.getElementById('profile-menu');
  if(menu) menu.classList.toggle('open');
  else {
    // Crear menú rápido si no existe
    const btn = T('profile-btn');
    const div = document.createElement('div');
    div.id = 'profile-menu';
    div.className = 'profile-menu';
    div.innerHTML = '<div class="pm-item" onclick="doLogout()">🚪 Cerrar sesión</div>';
    btn.parentNode.appendChild(div);
    div.classList.add('open');
    setTimeout(() => {
      document.addEventListener('click', function cerrar(e) {
        if(!div.contains(e.target) && e.target !== btn) {
          div.remove();
          document.removeEventListener('click', cerrar);
        }
      });
    }, 100);
  }
};
</script>
</body>
</html>
